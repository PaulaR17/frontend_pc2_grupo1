<!--
  Landing publica de EcoTraffic
  Pantalla limpia: nombre + frase + dos botones. Aparece como
  primera pagina para todos los usuarios (logueados o no).
-->
<div class="d-flex flex-column min-vh-100 landing-bg text-white">

  <!-- Cabecera minima con un solo acceso a la derecha -->
  <header class="d-flex justify-content-between align-items-center px-4 py-3">
    <span class="logo-eco text-white fs-5 fw-bold">
      ECO<span>TRAFFIC</span>
    </span>

    <!-- Si esta logueado, ofrece ir a su panel; si no, al login -->
    <a *ngIf="estaLogueado"
       [routerLink]="rutaPanel()"
       class="text-white-50 text-decoration-none small">
      Ir a mi panel
    </a>
    <a *ngIf="!estaLogueado"
       routerLink="/login"
       class="text-white-50 text-decoration-none small">
      Iniciar sesión
    </a>
  </header>

  <!-- Hero centrado -->
  <main class="flex-grow-1 d-flex align-items-center justify-content-center px-3">
    <div class="text-center" style="max-width: 720px;">

      <h1 class="display-2 fw-bold mb-3">
        ECO<span class="text-eco-green">TRAFFIC</span>
      </h1>

      <p class="lead mb-5 text-white-50">
        Muévete por Madrid de forma más limpia, fácil y consciente.
      </p>

      <!-- Botones para invitados -->
      <div class="d-flex flex-wrap gap-3 justify-content-center"
           *ngIf="!estaLogueado">
        <a routerLink="/map" class="btn btn-outline-light btn-lg rounded-pill px-4">
          Ver el mapa
        </a>
        <a routerLink="/register" class="btn btn-success btn-lg rounded-pill px-4">
          Crear cuenta
        </a>
      </div>

      <!-- Botones para usuarios ya logueados -->
      <div class="d-flex flex-wrap gap-3 justify-content-center"
           *ngIf="estaLogueado">
        <a routerLink="/map" class="btn btn-outline-light btn-lg rounded-pill px-4">
          Ver el mapa
        </a>
        <a [routerLink]="rutaPanel()" class="btn btn-success btn-lg rounded-pill px-4">
          Ir a mi panel
        </a>
      </div>

    </div>
  </main>

  <app-footer></app-footer>
</div>
