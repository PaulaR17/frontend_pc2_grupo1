<div class="register-page">
  <div class="form-side">
    <div class="register-card">
      <div class="register-header">
        <h2 class="logo">ECO<span>TRAFFIC</span></h2>
        <h1>CREATE YOUR ACCOUNT</h1>
        <p>Únete a la comunidad líder en tráfico ecológico y explora Madrid de forma segura.</p>
      </div>

      <form class="register-form">
        <div class="input-field-group">
          <label>Full Name</label>
          <div class="input-wrapper">
            <img src="assets/icon-user.png" class="field-icon">
            <input type="text" placeholder="Tu nombre completo">
          </div>
        </div>

        <div class="input-field-group">
          <label>Email Address</label>
          <div class="input-wrapper">
            <img src="assets/icon-email.png" class="field-icon">
            <input type="email" placeholder="tu@email.com">
          </div>
        </div>

        <div class="input-field-group">
          <label>Create Password</label>
          <div class="input-wrapper">
            <img src="assets/icon-lock.png" class="field-icon">
            <input type="password" placeholder="Mínimo 8 caracteres">
          </div>
        </div>

        <div class="input-field-group">
          <label>Confirm Password</label>
          <div class="input-wrapper">
            <img src="assets/icon-lock.png" class="field-icon">
            <input type="password" placeholder="Repite tu contraseña">
          </div>
        </div>

        <div class="input-field-group">
          <label>Interests</label>
          <div class="input-wrapper">
            <img src="assets/icon-leaf.png" class="field-icon">
            <input type="text" placeholder="Zonas de interés o vehículo">
          </div>
        </div>

        <button type="submit" class="btn-primary">Register Now</button>

        <div class="form-footer">
          <p>¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión aquí</a></p>
        </div>
      </form>
    </div>
  </div>

  <div class="illustration-side">
    <div class="welcome-content">
      <img src="assets/Pet/LoginPet.png" alt="Mascota EcoTraffic" class="mascota-img">
    </div>
  </div>
</div>
