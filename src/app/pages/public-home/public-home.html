<div class="main-wrapper">
  <nav class="top-nav">
    <div class="logo">ECO<span>TRAFFIC</span></div>
    <div class="nav-buttons">
      <button class="btn-navbar btn-navbar-outline" routerLink="/register">Registrarse</button>
      <button class="btn-navbar btn-navbar-filled" routerLink="/login">Iniciar Sesión</button>
    </div>
  </nav>

  <div class="dashboard-container">
    <aside class="info-panel">
      <div class="search-wrapper">
        <div class="search-card">
          <img src="assets/Icons/search-icon.png" class="search-icon-img" alt="Buscar">
          
          <input 
            type="text" 
            [(ngModel)]="searchQuery" 
            (focus)="mostrarSugerencias = true"
            (keyup.enter)="onSearch()" 
            placeholder="Busca una zona en Madrid...">
          
          <button class="btn-go" (click)="onSearch()">
            <img src="assets/Icons/go-icon.png" class="go-icon-img" alt="Ir">
          </button>
        </div>

        <ul class="suggestions-list" *ngIf="mostrarSugerencias">
          <li *ngFor="let zona of zonasDisponibles" (click)="seleccionarZona(zona)">
            <img src="assets/Icons/pin-icon.png" class="pin-icon-img" alt="Zona">
            {{ zona }}
          </li>
        </ul>
      </div>

      <div class="menu-items">
        <button class="menu-btn active">Inicio</button>
        <div class="mascota-container">
          <img src="assets/Pet/NoUserPet.png" alt="Mascota" (error)="$any($event.target).style.display='none'">
        </div>
        <button class="menu-btn outline">Ayuda / Dudas</button>
      </div>
    </aside>

    <main class="map-section">
      <div id="map" class="map-viewport"></div>

      <div class="limit-overlay" *ngIf="showLimitModal">
        <div class="limit-card">
          <h3>Límite de búsquedas alcanzado</h3>
          <p>Has realizado {{searchCount}} búsquedas. Para seguir explorando, por favor regístrate.</p>
          <div class="modal-actions">
            <button class="btn-filled" routerLink="/register">Registrarse gratis</button>
            <button class="btn-outline" routerLink="/login">Iniciar sesión</button>
            <button class="btn-close" (click)="showLimitModal = false">Cerrar</button>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
