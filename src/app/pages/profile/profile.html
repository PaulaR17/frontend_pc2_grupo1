<div class="main-wrapper">

  <nav class="top-nav">
    <a routerLink="/home" class="logo">ECO<span>TRAFFIC</span></a>
    
    <div class="nav-actions">
      <div class="user-pill" (click)="toggleUserMenu()" [class.open]="userMenuOpen">
        <div class="user-avatar">{{ userInitials }}</div>
        <span class="user-name-nav">{{ form.name || user?.name }}</span>
        <img src="assets/Icons/chevron-down.png" class="nav-icon-img" alt="Desplegar">
      </div>

      <div class="user-dropdown" *ngIf="userMenuOpen">
        <a class="dropdown-item" routerLink="/home">
          <img src="assets/Icons/home-icon.png" class="dropdown-icon-img" alt="">
          Inicio
        </a>
        <button class="dropdown-item danger" (click)="logout()">
          <img src="assets/Icons/logout-icon.png" class="dropdown-icon-img" alt="">
          Cerrar Sesión
        </button>
      </div>
    </div>
  </nav>

  <div class="profile-body">

    <aside class="profile-aside">
      
      <div class="avatar-hero">
        <div class="avatar-ring">
          <div class="avatar-circle" *ngIf="!avatarPreview">{{ userInitials }}</div>
          <img *ngIf="avatarPreview" [src]="avatarPreview" class="avatar-img" alt="Foto de perfil">
          <label class="avatar-upload-btn" title="Cambiar foto">
            <img src="assets/Icons/camera-icon.png" class="edit-icon-img" alt="Subir">
            <input type="file" accept="image/*" (change)="onAvatarChange($event)" hidden>
          </label>
        </div>
        <p class="avatar-name">{{ form.name || user?.name }}</p>
        <p class="avatar-mail">{{ form.mail || user?.mail }}</p>
      </div>

      <div class="stats-block">
        <div class="stat-chip">
          <span class="stat-value">{{ searchCount }}</span>
          <span class="stat-label">Búsquedas</span>
        </div>
        <div class="stat-chip">
          <span class="stat-value">{{ savedRoutesCount }}</span>
          <span class="stat-label">Rutas</span>
        </div>
        <div class="stat-chip eco">
          <span class="stat-value">{{ ecoScore }}</span>
          <span class="stat-label">Eco Score</span>
        </div>
      </div>

      <nav class="aside-menu">
        <button class="aside-btn" [class.active]="activeSection === 'personal'" (click)="activeSection = 'personal'">
          <img src="assets/Icons/icon-user.png" class="menu-icon-img" alt="">
          Datos personales
        </button>
        <button class="aside-btn" [class.active]="activeSection === 'seguridad'" (click)="activeSection = 'seguridad'">
          <img src="assets/Icons/icon-lock.png" class="menu-icon-img" alt="">
          Seguridad
        </button>
        <button class="aside-btn" [class.active]="activeSection === 'vehiculos'" (click)="activeSection = 'vehiculos'">
          <img src="assets/Icons/car-icon.png" class="menu-icon-img" alt="">
          Mis vehículos
        </button>
        <button class="aside-btn" [class.active]="activeSection === 'preferencias'" (click)="activeSection = 'preferencias'">
          <img src="assets/Icons/gear-icon.png" class="menu-icon-img" alt="">
          Preferencias
        </button>
      </nav>
    </aside>

    <main class="profile-main">
      <section class="form-card" *ngIf="activeSection === 'personal'">
        <div class="form-card-header">
          <div class="header-icon personal">
            <img src="assets/Icons/icon-user.png" class="header-icon-img" alt="">
          </div>
          <div>
            <h2>Datos personales</h2>
            <p>Actualiza tu información de perfil</p>
          </div>
        </div>

        <div class="form-grid">
          <div class="field-group full">
            <label>Nombre completo</label>
            <div class="input-wrap">
              <img src="assets/Icons/user-input.png" class="input-icon-img" alt="">
              <input type="text" [(ngModel)]="form.name" placeholder="Tu nombre">
            </div>
          </div>

          <div class="field-group">
            <label>Correo electrónico</label>
            <div class="input-wrap">
              <img src="assets/Icons/icon-mail.png" class="input-icon-img" alt="">
              <input type="email" [(ngModel)]="form.mail" placeholder="tu@email.com">
            </div>
          </div>

          <div class="field-group">
            <label>Teléfono</label>
            <div class="input-wrap">
              <img src="assets/Icons/phone-icon.png" class="input-icon-img" alt="">
              <input type="tel" [(ngModel)]="form.phone" placeholder="+34 000 000 000">
            </div>
          </div>

          <div class="field-group">
            <label>Ciudad</label>
            <div class="input-wrap">
              <img src="assets/Icons/pin-icon.png" class="input-icon-img" alt="">
              <input type="text" [(ngModel)]="form.city" placeholder="Madrid">
            </div>
          </div>

          <div class="field-group full">
            <label>Bio <span class="optional">opcional</span></label>
            <div class="input-wrap textarea-wrap">
              <img src="assets/Icons/text-align-left.png" class="input-icon-img" alt="">
              <textarea [(ngModel)]="form.bio" placeholder="Cuéntanos algo sobre ti..." rows="3"></textarea>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button class="btn-cancel" (click)="resetForm()">Descartar cambios</button>
          <button class="btn-save" (click)="saveProfile()" [class.loading]="saving">
            <img *ngIf="!saving" src="assets/Icons/check-icon.png" class="btn-icon-img" alt="">
            <span class="spinner" *ngIf="saving"></span>
            {{ saving ? 'Guardando...' : 'Guardar cambios' }}
          </button>
        </div>
      </section>
      
      </main>
  </div>
</div>
