<div class="login-page">
  <div class="illustration-side">
    <div class="welcome-content">
      <img src="assets/Pet/LoginPet.png" alt="Mascota EcoTraffic" class="mascota-img">
    </div>
  </div>

  <div class="form-side">
    <div class="login-card">
      <div class="login-header">
        <h2 class="logo">ECO<span>TRAFFIC</span></h2>
        <p>Inicia sesión para continuar</p>
      </div>

      <form class="login-form">
        <div class="input-field-group">
          <label>Username or Email</label>
          <div class="input-wrapper">
            <img src="assets/icon-user.png" class="field-icon">
            <input type="text" placeholder="tu@email.com">
          </div>
        </div>

        <div class="input-field-group">
          <label>Password</label>
          <div class="input-wrapper">
            <img src="assets/icon-lock.png" class="field-icon">
            <input type="password" placeholder="********">
          </div>
        </div>

        <button class="btn-primary">Log In</button>

        <div class="form-footer">
          <a routerLink="/recovery">Forgot Password?</a>
          <p>¿No tienes cuenta? <a routerLink="/register">Regístrate</a></p>
        </div>
      </form>
    </div>
  </div>
</div>
