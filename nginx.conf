server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    #cualquier ruta que no exista como fichero -> index.html (lo gestiona el router de Angular)
    location / {
        try_files $uri $uri/ /index.html;
    }

    #cachea agresivamente los assets versionados (Angular pone hash en el nombre)
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
